services:

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: sentinel-fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # point to external services, not localhost
      - DATABASE_URL=postgresql://user:pass@<RDS_PRIMARY_HOST>:5432/sentinel
      - DATABASE_READ_URL=postgresql://user:pass@<RDS_REPLICA_HOST>:5432/sentinel
      - REDIS_URL=redis://<ELASTICACHE_HOST>:6379
      - MCP_SERVER_URL=http://<ALB_MCP_DNS>:8001
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: sentinel-mcp
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@<RDS_PRIMARY_HOST>:5432/sentinel
      - REDIS_URL=redis://<ELASTICACHE_HOST>:6379
    deploy:
      replicas: 2

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: sentinel-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@<RDS_PRIMARY_HOST>:5432/sentinel
      - REDIS_URL=redis://<ELASTICACHE_HOST>:6379
      - MCP_SERVER_URL=http://<ALB_MCP_DNS>:8001
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis and Postgres removed from compose
  # managed externally by AWS